name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DATABASE_URL: "postgresql://architrack:architrack@localhost:5432/architrack?schema=public"
  AUTH_SECRET: "ci-only-secret-not-for-production-use-1234567890"
  APP_URL: "http://localhost:3000"
  SMTP_HOST: "smtp.example.com"
  SMTP_PORT: "587"
  SMTP_USER: "ci"
  SMTP_PASS: "ci"
  SMTP_FROM: "ArchiTrack CI <ci@architrack.local>"
  UPLOADS_DIR: "./data/uploads"
  MAX_UPLOAD_MB: "500"
  DEFAULT_LOCALE: "sk"

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: architrack
          POSTGRES_PASSWORD: architrack
          POSTGRES_DB: architrack
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U architrack -d architrack"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Prisma generate
        run: pnpm db:generate

      - name: Run migrations
        run: pnpm db:migrate:deploy

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: i18n key parity check
        run: node scripts/check-i18n-parity.mjs

  e2e:
    runs-on: ubuntu-latest
    needs: ci

    env:
      DATABASE_URL: "postgresql://architrack:architrack@localhost:5432/architrack?schema=public"
      AUTH_SECRET: "ci-only-secret-not-for-production-use-1234567890"
      APP_URL: "http://localhost:3100"
      SMTP_HOST: "smtp.example.com"
      SMTP_PORT: "587"
      SMTP_USER: "ci"
      SMTP_PASS: "ci"
      SMTP_FROM: "ArchiTrack CI <ci@architrack.local>"
      UPLOADS_DIR: "./data/uploads"
      MAX_UPLOAD_MB: "500"
      DEFAULT_LOCALE: "sk"
      # Deliberately NOT setting PLAYWRIGHT_BASE_URL here: playwright.config.ts only
      # auto-starts its own dev server (with AUTH_RATE_LIMIT_PER_MINUTE=100 and the
      # matching APP_URL baked into that server's env) when PLAYWRIGHT_BASE_URL is unset.
      # `reuseExistingServer: !process.env.CI` also means CI always starts a fresh one.
      SEED_ADMIN_EMAIL: "admin@architrack.local"
      SEED_ADMIN_PASSWORD: "ChangeMe123!"

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: architrack
          POSTGRES_PASSWORD: architrack
          POSTGRES_DB: architrack
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U architrack -d architrack"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prisma generate
        run: pnpm db:generate

      - name: Run migrations
        run: pnpm db:migrate:deploy

      - name: Seed database
        run: pnpm db:seed

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run e2e suite
        run: pnpm exec playwright test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
